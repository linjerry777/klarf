version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: klarf_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: klarf_db
      MYSQL_USER: klarf_user
      MYSQL_PASSWORD: klarf_pass
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s

volumes:
  mysql_data:
